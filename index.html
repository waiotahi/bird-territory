<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Bird Territory – Forest Lifeforce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:#000; font-family:'Inter',system-ui,sans-serif; }

/* Full-bleed map */
#map {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── LOGO — top left, prominent ────────────────────────────────── */
#logo-block {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 100;
  pointer-events: none;
}
#logo-img {
  width: 96px;
  height: auto;
  display: block;
  filter: drop-shadow(0 1px 6px rgba(0,0,0,0.5));
}


/* ── BIRD DROPDOWN — top right ──────────────────────────────────── */
#bird-panel {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 100;
  min-width: 190px;
  max-width: 220px;
}

/* Trigger button */
#bird-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 8px;
  padding: 9px 12px;
  color: #fff;
  font-size: 12px;
  font-family: inherit;
  font-weight: 400;
  cursor: pointer;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  user-select: none;
  transition: background .15s, border-color .15s;
}
#bird-trigger:hover { background: rgba(20,20,20,0.82); border-color: rgba(255,255,255,0.22); }
#bird-trigger .trigger-left { display:flex; align-items:center; gap:6px; }
#bird-trigger .trigger-dots { display:flex; gap:3px; }
#bird-trigger .td { width:7px; height:7px; border-radius:50%; opacity:.85; }
#bird-trigger .trigger-label { font-size:12px; color:rgba(255,255,255,0.8); }
#bird-trigger .trigger-count {
  font-size:10px; color:rgba(255,255,255,0.38);
  background:rgba(255,255,255,0.07);
  border-radius:10px; padding:1px 6px;
}
#chevron { width:12px; height:12px; flex-shrink:0; opacity:.5; transition:transform .2s; }
#bird-panel.open #chevron { transform:rotate(180deg); }

/* Dropdown list */
#bird-dropdown {
  display: none;
  margin-top: 4px;
  background: rgba(0,0,0,0.82);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
  max-height: 60vh;
  overflow-y: auto;
}
#bird-panel.open #bird-dropdown { display:block; }

/* scrollbar */
#bird-dropdown::-webkit-scrollbar { width:3px; }
#bird-dropdown::-webkit-scrollbar-track { background:transparent; }
#bird-dropdown::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }

.bird-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background .1s;
  user-select: none;
}
.bird-opt:last-child { border-bottom:none; }
.bird-opt:hover { background:rgba(255,255,255,0.06); }
.bird-opt:active { background:rgba(255,255,255,0.1); }
.bo-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; transition:opacity .2s; }
.bo-name { font-size:13px; color:rgba(255,255,255,0.85); flex:1; font-weight:300; }
.bo-ct { font-size:10px; color:rgba(255,255,255,0.25); }
.bo-check {
  width:14px; height:14px; border-radius:3px;
  border:1px solid rgba(255,255,255,0.2);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition:background .15s, border-color .15s;
}
.bo-check svg { display:none; }
.bird-opt.active .bo-check { background:rgba(255,255,255,0.9); border-color:transparent; }
.bird-opt.active .bo-check svg { display:block; }
.bird-opt.inactive .bo-dot { opacity:.18; }
.bird-opt.inactive .bo-name { color:rgba(255,255,255,0.3); }

/* Select all row */
#select-all-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}
#select-all-row:hover { background:rgba(255,255,255,0.05); }
#select-all-row span { font-size:10px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:.06em; font-weight:500; }
#select-all-row .sa-btns { display:flex; gap:6px; }
.sa-btn { font-size:10px; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:4px; padding:2px 7px; cursor:pointer; }
.sa-btn:hover { background:rgba(255,255,255,0.13); color:#fff; }

/* ── RASTER TOGGLE — bottom right of dropdown or standalone ─────── */
#raster-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px;
  border-top:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
}
#raster-row span { font-size:11px; color:rgba(255,255,255,0.45); }
.tog { position:relative; width:28px; height:16px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; position:absolute; }
.tog-tr { position:absolute; inset:0; background:rgba(255,255,255,0.15); border-radius:8px; transition:background .2s; }
.tog input:checked~.tog-tr { background:rgba(255,255,255,0.55); }
.tog-kn { position:absolute; top:2px; left:2px; width:12px; height:12px; background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.5); }
.tog input:checked~.tog-kn { transform:translateX(12px); }

/* ── INFO SHEET ─────────────────────────────────────────────────── */
#infosheet {
  position: fixed;
  bottom: 0; left:0; right:0;
  z-index: 200;
  background: rgba(0,0,0,0.82);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px 14px 0 0;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(.32,.72,0,1);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
#infosheet.open { transform:translateY(0); }
.s-handle { width:30px; height:3px; background:rgba(255,255,255,0.15); border-radius:2px; margin:10px auto 0; }
.s-inner { padding:10px 18px 20px; }
.s-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.s-head-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.s-head h3 { font-size:14px; font-weight:400; color:#fff; }
.s-badge { margin-left:auto; font-size:10px; color:rgba(255,255,255,0.35); background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:2px 7px; border-radius:4px; white-space:nowrap; }
.s-row { display:flex; justify-content:space-between; align-items:baseline; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:12px; }
.s-row:last-child { border:none; }
.s-k { color:rgba(255,255,255,0.35); font-size:11px; }
.s-v { color:rgba(255,255,255,0.8); font-size:11px; font-variant-numeric:tabular-nums; }

/* Desktop: side panel */
@media(min-width:768px){
  #infosheet{
    bottom:auto; top:16px; left:auto; right:16px;
    width:230px; border-radius:10px; border:1px solid rgba(255,255,255,0.12);
    border-top:1px solid rgba(255,255,255,0.12);
    transform:scale(0.95) translateY(-8px); opacity:0;
    transition:transform .2s ease, opacity .2s ease;
    max-height:calc(100vh - 160px); overflow-y:auto;
  }
  #infosheet.open{transform:scale(1) translateY(0);opacity:1;}
  #bird-panel{right:260px;}
  .s-handle{display:none;}
}

/* ── BASEMAP SELECTOR ── */
#basemap-sel{position:fixed;bottom:16px;left:16px;z-index:100;}
#basemap-btn{
  background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.14);border-radius:8px;
  padding:7px 11px;color:rgba(255,255,255,0.6);font-size:11px;font-family:inherit;
  cursor:pointer;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s;
}
#basemap-btn:hover{background:rgba(20,20,20,0.85);color:#fff;}
#basemap-sel.open #basemap-btn{border-color:rgba(255,255,255,0.25);}
#basemap-menu{
  display:none;position:absolute;bottom:calc(100% + 4px);left:0;
  background:rgba(0,0,0,0.84);border:1px solid rgba(255,255,255,0.12);border-radius:8px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow:hidden;min-width:160px;
}
#basemap-sel.open #basemap-menu{display:block;}
.bm-opt{
  padding:8px 14px;font-size:12px;color:rgba(255,255,255,0.55);cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);transition:background .1s,color .1s;
}
.bm-opt:last-child{border-bottom:none;}
.bm-opt:hover{background:rgba(255,255,255,0.07);color:#fff;}
.bm-opt.sel{color:#fff;font-weight:500;}
.bm-opt.sel::before{content:'✓  ';}

/* ── GPS LOCATE ── */
#gps-btn{
  position:fixed;bottom:16px;right:56px;z-index:100;
  width:36px;height:36px;border-radius:8px;
  background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s, border-color .15s;
}
#gps-btn:hover{background:rgba(20,20,20,0.85);border-color:rgba(255,255,255,0.25);}
#gps-btn.active{background:rgba(0,80,40,0.75);border-color:rgba(74,222,128,0.4);}
#gps-btn.active svg{stroke:rgba(74,222,128,0.9);}
#gps-btn.waiting{border-color:rgba(255,200,0,0.4);}
#gps-btn.waiting svg{stroke:rgba(255,200,0,0.8);}
#gps-btn svg{stroke:rgba(255,255,255,0.55);transition:stroke .2s;}

/* Leaflet overrides */
.leaflet-control-zoom { border:none!important; }
.leaflet-control-zoom a {
  background:rgba(0,0,0,0.72)!important;
  backdrop-filter:blur(16px)!important;
  color:rgba(255,255,255,0.7)!important;
  border:1px solid rgba(255,255,255,0.12)!important;
  font-size:16px!important;
  line-height:26px!important;
}
.leaflet-control-zoom a:hover{background:rgba(0,0,0,0.85)!important;color:#fff!important;}
.leaflet-bar{box-shadow:0 2px 12px rgba(0,0,0,.5)!important;border-radius:8px!important;overflow:hidden;}
.leaflet-control-attribution{
  background:rgba(0,0,0,0.5)!important;
  color:rgba(255,255,255,0.3)!important;
  font-size:9px!important;
  backdrop-filter:blur(8px);
}
.leaflet-control-attribution a{color:rgba(255,255,255,0.35)!important;}
</style>
</head>

<!-- Bird selector dropdown — top right -->
<div id="bird-panel">
  <button id="bird-trigger" onclick="toggleDropdown()">
    <span class="trigger-left">
      <span class="trigger-dots" id="trigger-dots"></span>
      <span class="trigger-label">Select bird</span>
    </span>
    <span class="trigger-count" id="trigger-count">5 / 5</span>
    <svg id="chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 4l4 4 4-4"/>
    </svg>
  </button>
  <div id="bird-dropdown">
    <div id="select-all-row">
      <span>Birds</span>
      <div class="sa-btns">
        <span class="sa-btn" onclick="selectAll(true)">All</span>
        <span class="sa-btn" onclick="selectAll(false)">None</span>
      </div>
    </div>
    <div id="bird-opts"></div>
    <div id="raster-row">
      <span>Canopy raster</span>
      <label class="tog" onclick="event.stopPropagation()">
        <input type="checkbox" id="rtog" checked>
        <span class="tog-tr"></span><span class="tog-kn"></span>
      </label>
    </div>
  </div>
</div>

<!-- Info sheet -->
<div id="infosheet">
  <div class="s-handle"></div>
  <div class="s-inner">
    <div class="s-head">
      <div class="s-head-dot" id="s-dot"></div>
      <h3 id="s-title">Bird Territory</h3>
      <span class="s-badge" id="s-badge">tap a fix</span>
    </div>
    <div id="s-body" style="font-size:11px;color:rgba(255,255,255,0.25)">Select any marker on the map</div>
  </div>
</div>

const TF_ATTR='© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://www.thunderforest.com/">Thunderforest</a>';
let currentBase=L.tileLayer(BASEMAPS['Outdoors'],{maxZoom:22,maxNativeZoom:18,attribution:TF_ATTR}).addTo(map);
function switchBasemap(name){
  map.removeLayer(currentBase);
  currentBase=L.tileLayer(BASEMAPS[name],{
    maxZoom:22,maxNativeZoom:18,attribution:TF_ATTR,updateWhenIdle:false
  }).addTo(map);
  currentBase.bringToBack();
}

L.control.zoom({position:'bottomright'}).addTo(map);

// Layers
const activeBirds=new Set(); // start with no markers shown
const layers={};
const sheet=document.getElementById('infosheet');

function openSheet(bird,pt){
  document.getElementById('s-dot').style.cssText=`background:${bird.color}`;
  document.getElementById('s-title').textContent=bird.name;
  document.getElementById('s-badge').textContent=`fix #${pt.id}${pt.id===1?' · first':''}`;
  document.getElementById('s-body').innerHTML=`
    <div class="s-row"><span class="s-k">Lat (WGS84)</span><span class="s-v">${pt.lat.toFixed(7)}</span></div>
    <div class="s-row"><span class="s-k">Lon (WGS84)</span><span class="s-v">${pt.lon.toFixed(7)}</span></div>
    <div class="s-row"><span class="s-k">Easting (NZTM)</span><span class="s-v">${pt.e.toFixed(1)}</span></div>
    <div class="s-row"><span class="s-k">Northing (NZTM)</span><span class="s-v">${pt.n.toFixed(1)}</span></div>`;
  sheet.classList.add('open');
  closeDropdown();
}
map.on('click',()=>{sheet.classList.remove('open');});

BIRDS.forEach(bird=>{
  const mg=L.layerGroup(); // markers start hidden — added to map when bird selected
  const raster=L.imageOverlay(bird.rasterB64,[bird.sw,bird.ne],{opacity:0.7,interactive:false}).addTo(map);
  layers[bird.name]={markers:mg,raster};
  bird.pts.forEach(pt=>{
    const first=pt.id===1, sz=first?11:8;
    // Muted, smaller dots — 60% opacity colour
    const col=bird.color+'99'; // ~60% opacity via hex alpha
    const icon=L.divIcon({className:'',
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${bird.color};opacity:0.62;border:1.5px solid rgba(255,255,255,0.4);box-shadow:0 1px 4px rgba(0,0,0,0.6)"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    L.marker([pt.lat,pt.lon],{icon}).addTo(mg).on('click',e=>{L.DomEvent.stopPropagation(e);openSheet(bird,pt);});
  });
});

// Open on Bruce's raster at zoom 16, markers hidden
map.setView([-38.8494067, 176.8481575], 16);

// Raster toggle
document.getElementById('rtog').addEventListener('change',e=>{
  BIRDS.forEach(b=>{if(activeBirds.has(b.name)){e.target.checked?layers[b.name].raster.addTo(map):layers[b.name].raster.remove();}});
});

// Dropdown
function updateTrigger(){
  const n=activeBirds.size, total=BIRDS.length;
  document.getElementById('trigger-count').textContent=`${n} / ${total}`;
  // Show dots of active birds (max 5)
  const dotsEl=document.getElementById('trigger-dots');
  dotsEl.innerHTML=BIRDS.filter(b=>activeBirds.has(b.name)).slice(0,5)
    .map(b=>`<span class="td" style="background:${b.color};opacity:0.7"></span>`).join('');
}

function buildBirdOpts(){
  const el=document.getElementById('bird-opts');
  BIRDS.forEach(bird=>{
    const row=document.createElement('div');
    row.className='bird-opt inactive';
    row.dataset.name=bird.name;
    row.innerHTML=`
      <div class="bo-dot" style="background:${bird.color}"></div>
      <span class="bo-name">${bird.name}</span>
      <span class="bo-ct">${bird.pts.length}</span>
      <div class="bo-check">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1 4l2.5 2.5L7 1.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;
    row.addEventListener('click',e=>{
      e.stopPropagation();
      const on=activeBirds.has(bird.name);
      if(on){
        activeBirds.delete(bird.name);
        row.classList.replace('active','inactive');
        layers[bird.name].markers.remove();
      } else {
        activeBirds.add(bird.name);
        row.classList.replace('inactive','active');
        layers[bird.name].markers.addTo(map);
        // Fly to this bird's raster centre at zoom 16
        const clat=(bird.sw[0]+bird.ne[0])/2, clon=(bird.sw[1]+bird.ne[1])/2;
        map.flyTo([clat,clon], 16, {duration:1.2, easeLinearity:0.4});
        closeDropdown();
      }
      updateTrigger();
    });
    el.appendChild(row);
  });
  updateTrigger();
}

function toggleDropdown(){
  document.getElementById('bird-panel').classList.toggle('open');
}
function closeDropdown(){
  document.getElementById('bird-panel').classList.remove('open');
}
function selectAll(on){
  BIRDS.forEach(b=>{
    const row=document.querySelector(`.bird-opt[data-name="${b.name}"]`);
    if(on){activeBirds.add(b.name);row.classList.replace('inactive','active');layers[b.name].markers.addTo(map);if(document.getElementById('rtog').checked)layers[b.name].raster.addTo(map);}
    else{activeBirds.delete(b.name);row.classList.replace('active','inactive');layers[b.name].markers.remove();layers[b.name].raster.remove();}
  });
  updateTrigger();
}

// Close dropdown on map click
map.on('click',closeDropdown);
document.addEventListener('click',e=>{if(!document.getElementById('bird-panel').contains(e.target))closeDropdown();});

buildBirdOpts();


// Basemap menu
(function(){
  const menu=document.getElementById('basemap-menu');
  Object.keys(BASEMAPS).forEach(function(name,i){
    const el=document.createElement('div');
    el.className='bm-opt'+(i===0?' sel':'');
    el.textContent=name;
    el.addEventListener('click',function(e){
      e.stopPropagation();
      switchBasemap(name);
      document.querySelectorAll('.bm-opt').forEach(function(o){o.classList.remove('sel');});
      el.classList.add('sel');
      document.getElementById('bm-label').textContent=name;
      document.getElementById('basemap-sel').classList.remove('open');
    });
    menu.appendChild(el);
  });
})();
function toggleBM(){
  document.getElementById('basemap-sel').classList.toggle('open');
  closeDropdown();
}
document.addEventListener('click',function(e){
  if(!document.getElementById('basemap-sel').contains(e.target))
    document.getElementById('basemap-sel').classList.remove('open');
});


// ── GPS locate ───────────────────────────────────────────────────────────────
let gpsActive = false;
let gpsWatchId = null;
let gpsMarker = null;
let gpsAccCircle = null;
let gpsFollowing = true;

function createGPSMarker(latlng, accuracy){
  // Accuracy circle
  if(gpsAccCircle) map.removeLayer(gpsAccCircle);
  gpsAccCircle = L.circle(latlng, {
    radius: accuracy,
    color: 'rgba(74,222,128,0.6)',
    fillColor: 'rgba(74,222,128,0.08)',
    fillOpacity: 1,
    weight: 1.5,
    interactive: false
  }).addTo(map);

  // Position dot
  if(gpsMarker) map.removeLayer(gpsMarker);
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:rgba(74,222,128,0.9);
      border:2.5px solid #fff;
      box-shadow:0 0 0 3px rgba(74,222,128,0.3), 0 2px 8px rgba(0,0,0,0.5);
    "></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
  gpsMarker = L.marker(latlng, {icon, zIndexOffset:500}).addTo(map);
}

function toggleGPS(){
  const btn = document.getElementById('gps-btn');
  if(!gpsActive){
    // Start
    if(!navigator.geolocation){
      alert('Geolocation is not supported by this browser.');
      return;
    }
    btn.classList.add('waiting');
    gpsFollowing = true;
    // iOS requires getCurrentPosition first to trigger permission prompt
    navigator.geolocation.getCurrentPosition(
      function(pos){
        // Permission granted - now start watching
        gpsWatchId = navigator.geolocation.watchPosition(
      function(pos){
        const latlng = [pos.coords.latitude, pos.coords.longitude];
        const acc = pos.coords.accuracy;
        createGPSMarker(latlng, acc);
        if(gpsFollowing) map.setView(latlng, Math.max(map.getZoom(), 16));
        btn.classList.remove('waiting');
        btn.classList.add('active');
        gpsActive = true;
      },
      function(err){
        btn.classList.remove('waiting','active');
        gpsActive = false;
        const msgs = {
          1:'Permission denied (code 1) — go to Settings > Privacy > Location Services > Safari Websites > Allow',
          2:'Position unavailable (code 2) — no GPS signal',
          3:'Timeout (code 3) — GPS took too long'
        };
        alert('GPS error: ' + (msgs[err.code] || 'Unknown error, code: '+err.code+', message: '+err.message));
      },
        {enableHighAccuracy:true, maximumAge:5000, timeout:15000}
      );
    },
    function(err){
      btn.classList.remove('waiting','active');
      gpsActive = false;
      const msgs = {
        1:'Permission denied — go to Settings > Privacy & Security > Location Services > Safari Websites > Allow',
        2:'Position unavailable',
        3:'Timed out getting location'
      };
      alert('GPS: ' + (msgs[err.code] || 'Error code '+err.code));
    },
    {enableHighAccuracy:true, maximumAge:0, timeout:10000}
    );
  } else {
    // Stop
    if(gpsWatchId !== null){ navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
    if(gpsMarker){ map.removeLayer(gpsMarker); gpsMarker = null; }
    if(gpsAccCircle){ map.removeLayer(gpsAccCircle); gpsAccCircle = null; }
    btn.classList.remove('active','waiting');
    gpsActive = false;
  }
}

// Stop following on manual pan, re-follow on GPS btn tap when already active
map.on('dragstart', function(){ gpsFollowing = false; });
document.getElementById('gps-btn').addEventListener('click', function(){
  if(gpsActive){ gpsFollowing = true; }
}, true);

// Service worker will be added as sw.js for offline support
</script>
